<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1557B0"/>
      <stop offset="100%" stop-color="#2B7DE1"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0A3060" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="225" ry="225" fill="url(#bg)"/>

  <g transform="translate(480, 500)" filter="url(#shadow)">

    <!-- R 竖线 → 直角梯形：上直角、下斜边、左长右短 -->
    <path d="
      M -180 -330
      L -130 -330
      L -130 80
      L -180 350
      Z
    "  fill="none" stroke="#FFFFFF" stroke-width="50" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- R 的弧线头部 -->
    <path d="
      M -130 -320
      L 180 -320, 260 -200, 260 -50
      L 260 70, 170 110, 40 110
      L -130 110
    " fill="none" stroke="#FFFFFF" stroke-width="100" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- R 的斜腿 -->
    <path d="
      M 40 110
      L 280 320
    " stroke="#FFFFFF" stroke-width="100" stroke-linecap="round"/>

    <!-- 三圆点横向排列在 R 负空间内 -->
    <circle cx="-20" cy="-90" r="20" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="40" cy="-90" r="20" fill="#FFFFFF" opacity="0.55"/>
    <circle cx="100" cy="-90" r="20" fill="#FFFFFF" opacity="0.25"/>

  </g>
</svg>
