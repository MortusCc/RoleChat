<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RoleChat - AI 角色扮演</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 主容器 -->
  <div id="app">

    <!-- ========== 对话列表页 ========== -->
    <section id="page-chat-list" class="page">
      <header class="top-bar">
        <h1>对话</h1>
        <button id="btn-new-chat" class="icon-btn" title="新建对话">
          <svg class="icon" viewBox="0 0 48 48" fill="none"><path d="M24.0605 10L24.0239 38" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 24L38 24" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </header>
      <div class="search-bar">
        <svg class="icon icon-search" viewBox="0 0 48 48" fill="none"><path d="M21 38C30.3888 38 38 30.3888 38 21C38 11.6112 30.3888 4 21 4C11.6112 4 4 11.6112 4 21C4 30.3888 11.6112 38 21 38Z" fill="none" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/><path d="M26.657 14.3431C25.2093 12.8954 23.2093 12 21.0001 12C18.791 12 16.791 12.8954 15.3433 14.3431" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M33.2216 33.2217L41.7069 41.707" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <input type="text" id="search-input" placeholder="搜索对话...">
      </div>
      <div id="chat-list-container" class="list-container">
        <!-- 动态渲染对话卡片 -->
        <div class="empty-state">
          <p>还没有对话，点击右上角开始吧</p>
        </div>
      </div>
    </section>

    <!-- ========== 对话界面 ========== -->
    <section id="page-chat-room" class="page hidden">
      <header class="top-bar">
        <button id="btn-back" class="icon-btn" title="返回">
          <svg class="icon" viewBox="0 0 48 48" fill="none"><path d="M12.9998 8L6 14L12.9998 21" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 14H28.9938C35.8768 14 41.7221 19.6204 41.9904 26.5C42.2739 33.7696 36.2671 40 28.9938 40H11.9984" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="top-bar-title" id="chat-title">世界观名称</div>
        <button id="btn-role-switch" class="icon-btn" title="切换角色">
          <svg class="icon" viewBox="0 0 48 48" fill="none"><path d="M24 14C26.7614 14 29 11.7614 29 9C29 6.23858 26.7614 4 24 4C21.2386 4 19 6.23858 19 9C19 11.7614 21.2386 14 24 14Z" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M27 20H21C20.0713 20 19.607 20 19.2159 20.0385C15.4176 20.4126 12.4126 23.4176 12.0385 27.2159C12 27.607 12 28.0713 12 29H36C36 28.0713 36 27.607 35.9615 27.2159C35.5874 23.4176 32.5824 20.4126 28.7841 20.0385C28.393 20 27.9287 20 27 20Z" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M41 26.7837C42.9017 28.0079 44 29.4527 44 31C44 35.4183 35.0457 39 24 39C12.9543 39 4 35.4183 4 31C4 29.4527 5.09827 28.0079 7 26.7837" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M19 34L24 39L19 44" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </header>
      <div id="message-list" class="message-list">
        <!-- 动态渲染消息气泡 -->
      </div>
      <div class="input-area">
        <input type="text" id="message-input" placeholder="输入消息..." autocomplete="off">
        <button id="btn-send" class="icon-btn send-btn" title="发送">
          <svg class="icon" viewBox="0 0 48 48" fill="none"><path d="M43 5L29.7 43L22.1 25.9L5 18.3L43 5Z" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/><path d="M43.0001 5L22.1001 25.9" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </section>

    <!-- ========== 角色管理页 ========== -->
    <section id="page-role-manage" class="page hidden">
      <header class="top-bar">
        <h1>角色</h1>
        <button id="btn-new-role" class="icon-btn" title="新建角色">
          <svg class="icon" viewBox="0 0 48 48" fill="none"><path d="M24.0605 10L24.0239 38" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 24L38 24" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </header>
      <div id="role-list-container" class="list-container">
        <div class="empty-state">
          <p>还没有角色卡，点击右上角创建</p>
        </div>
      </div>
    </section>

    <!-- ========== 角色创建/编辑页 ========== -->
    <section id="page-role-create" class="page hidden">
      <header class="top-bar">
        <button id="btn-role-create-back" class="icon-btn" title="返回">
          <svg class="icon" viewBox="0 0 48 48" fill="none"><path d="M12.9998 8L6 14L12.9998 21" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 14H28.9938C35.8768 14 41.7221 19.6204 41.9904 26.5C42.2739 33.7696 36.2671 40 28.9938 40H11.9984" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <h1 id="role-create-title">新建角色</h1>
      </header>
      <form id="role-form" class="form-container">
        <div class="form-group">
          <label>
            <svg class="icon icon-label" viewBox="0 0 48 48" fill="none"><path d="M24 44C35.0457 44 44 35.0457 44 24C44 12.9543 35.0457 4 24 4C12.9543 4 4 12.9543 4 24C4 35.0457 12.9543 44 24 44Z" stroke="currentColor" stroke-width="4"/><path d="M4 20.8404C7.01485 19.4168 9.24466 19.2185 10.6894 20.2454C12.8566 21.7859 13.1283 28.064 18.0575 25.0635C22.9867 22.063 15.9467 20.8404 17.475 16.4939C19.0033 12.1474 24.0083 15.5237 24.5059 10.7627C24.8375 7.58862 21.0408 6.37413 13.1156 7.11921" stroke="currentColor" stroke-width="4"/><path d="M36.0001 8C30.2857 12.9886 28.2899 16.0011 30.0127 17.0373C32.5968 18.5917 33.6933 16.4033 36.8467 17.0373C40.0001 17.6714 39.3173 21.9457 37.6587 21.9457C36.0001 21.9457 27.41 20.8518 27.8427 25.865C28.2753 30.8781 33.4422 31.6203 33.4422 34.4211C33.4422 36.2883 32.299 39.146 30.0127 42.9942" stroke="currentColor" stroke-width="4" stroke-linecap="round"/><path d="M6.10449 32.9264C7.01598 32.5288 7.70115 32.2374 8.15999 32.052C12.0071 30.4978 14.8617 30.1314 16.7236 30.953C20.0161 32.4059 18.7503 35.3401 19.7816 36.4211C20.8128 37.5021 23.388 37.1876 23.388 39.244C23.388 40.615 22.9275 42.1637 22.0065 43.8901" stroke="currentColor" stroke-width="4" stroke-linecap="round"/></svg>
            世界观设定
          </label>
          <textarea id="role-worldview" rows="3" placeholder="描述世界观背景，例如：中世纪的魔法大陆..."></textarea>
        </div>
        <div class="form-group">
          <label>
            <svg class="icon icon-label" viewBox="0 0 48 48" fill="none"><circle cx="14" cy="29" r="5" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><circle cx="34" cy="29" r="5" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><circle cx="24" cy="9" r="5" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M24 44C24 38.4772 19.5228 34 14 34C8.47715 34 4 38.4772 4 44" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M44 44C44 38.4772 39.5228 34 34 34C28.4772 34 24 38.4772 24 44" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M34 24C34 18.4772 29.5228 14 24 14C18.4772 14 14 18.4772 14 24" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            AI 角色设定
          </label>
          <input type="text" id="role-ai-name" placeholder="角色名称">
          <textarea id="role-ai-persona" rows="2" placeholder="性格、口癖、说话风格..."></textarea>
        </div>
        <div class="form-group">
          <label>
            <svg class="icon icon-label" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="16" r="6" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M36 36C36 29.3726 30.6274 24 24 24C17.3726 24 12 29.3726 12 36" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M36 4H44V12" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 4H4V12" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M36 44H44V36" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 44H4V36" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            你的扮演身份
          </label>
          <input type="text" id="role-user-identity" placeholder="你在世界观中的身份">
        </div>
        <button type="submit" id="btn-save-role" class="btn-primary">
          <svg class="icon" viewBox="0 0 48 48" fill="none"><path d="M6 9C6 7.34315 7.34315 6 9 6H34.2814L42 13.2065V39C42 40.6569 40.6569 42 39 42H9C7.34315 42 6 40.6569 6 39V9Z" fill="none" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/><path fill-rule="evenodd" clip-rule="evenodd" d="M24.0083 6L24 13.3846C24 13.7245 23.5523 14 23 14H15C14.4477 14 14 13.7245 14 13.3846L14 6" fill="none"/><path d="M24.0083 6L24 13.3846C24 13.7245 23.5523 14 23 14H15C14.4477 14 14 13.7245 14 13.3846L14 6H24.0083Z" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/><path d="M9 6H34.2814" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M14 26H34" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M14 34H24.0083" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          保存角色
        </button>
      </form>
    </section>

    <!-- ========== 发现页 ========== -->
    <section id="page-discover" class="page hidden">
      <header class="top-bar">
        <h1>发现</h1>
      </header>
      <div id="discover-container" class="list-container">
        <!-- 动态渲染预设模板卡片 -->
      </div>
    </section>

    <!-- ========== 我的页 ========== -->
    <section id="page-profile" class="page hidden">
      <header class="top-bar">
        <h1>我的</h1>
      </header>
      <div class="list-container">
        <!-- 统计 -->
        <div class="profile-section">
          <div class="profile-item">
            <span>API 状态</span>
            <span id="api-status" class="status-badge">未检测</span>
          </div>
          <div class="profile-item">
            <span>对话数量</span>
            <span id="chat-count">0</span>
          </div>
          <div class="profile-item">
            <span>角色数量</span>
            <span id="role-count">0</span>
          </div>
        </div>

        <!-- API 服务商配置 -->
        <div class="api-config-section">
          <h3 class="section-title">API 配置</h3>

          <div class="form-group">
            <label>服务商</label>
            <select id="api-provider">
              <option value="deepseek">DeepSeek</option>
              <option value="openai">OpenAI</option>
              <option value="moonshot">Moonshot（月之暗面）</option>
              <option value="zhipu">智谱 GLM</option>
              <option value="qwen">通义千问</option>
              <option value="custom">自定义</option>
            </select>
          </div>

          <div class="form-group">
            <label>Base URL</label>
            <input type="url" id="api-base-url" placeholder="https://api.deepseek.com/v1/chat/completions">
            <span class="form-hint" id="hint-base-url">服务商预设已自动填充</span>
          </div>

          <div class="form-group">
            <label>API Key</label>
            <input type="password" id="api-key" placeholder="sk-...">
            <span class="form-hint">密钥仅保存在本地浏览器</span>
          </div>

          <div class="form-group">
            <label>模型名称</label>
            <div class="model-select-row">
              <select id="api-model-preset">
                <option value="">-- 选择预设模型 --</option>
              </select>
              <span class="form-hint" style="margin:0 4px;">或</span>
              <input type="text" id="api-model-custom" placeholder="自定义模型名">
            </div>
            <span class="form-hint">预设下拉选择，也可直接输入</span>
          </div>

          <div class="form-group">
            <button id="btn-test-api" class="btn-secondary">检测连接</button>
            <button id="btn-save-api" class="btn-primary">保存配置</button>
          </div>
        </div>
      </div>
    </section>

    <!-- ========== 底部导航栏 ========== -->
    <nav id="bottom-nav">
      <button class="nav-item active" data-page="chat-list" title="对话">
        <svg class="icon nav-icon" viewBox="0 0 48 48" fill="none"><path d="M44 7H4V37H11V42L21 37H44V7Z" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M31 16V17" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M17 16V17" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M31 25C31 25 29 29 24 29C19 29 17 25 17 25" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>对话</span>
      </button>
      <button class="nav-item" data-page="role-manage" title="角色">
        <svg class="icon nav-icon" viewBox="0 0 48 48" fill="none"><circle cx="14" cy="29" r="5" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><circle cx="34" cy="29" r="5" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><circle cx="24" cy="9" r="5" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M24 44C24 38.4772 19.5228 34 14 34C8.47715 34 4 38.4772 4 44" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M44 44C44 38.4772 39.5228 34 34 34C28.4772 34 24 38.4772 24 44" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M34 24C34 18.4772 29.5228 14 24 14C18.4772 14 14 18.4772 14 24" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>角色</span>
      </button>
      <button class="nav-item" data-page="discover" title="发现">
        <svg class="icon nav-icon" viewBox="0 0 48 48" fill="none"><path d="M24 40C32.8366 40 40 32.8366 40 24C40 15.1634 32.8366 8 24 8C15.1634 8 8 15.1634 8 24C8 32.8366 15.1634 40 24 40Z" fill="none" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/><path d="M37.5641 15.5098C41.7833 15.878 44.6787 17.1724 45.2504 19.306C46.3939 23.5737 37.8068 29.5827 26.0705 32.7274C14.3343 35.8721 3.89316 34.9617 2.74963 30.694C2.1505 28.458 4.22245 25.744 8.01894 23.2145" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>发现</span>
      </button>
      <button class="nav-item" data-page="profile" title="我的">
        <svg class="icon nav-icon" viewBox="0 0 48 48" fill="none"><path fill-rule="evenodd" clip-rule="evenodd" d="M24 44C35.0457 44 44 35.0457 44 24C44 12.9543 35.0457 4 24 4C12.9543 4 4 12.9543 4 24C4 35.0457 12.9543 44 24 44Z" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M24 23C26.7614 23 29 20.7614 29 18C29 15.2386 26.7614 13 24 13C21.2386 13 19 15.2386 19 18C19 20.7614 21.2386 23 24 23Z" fill="none" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/><path d="M10.022 38.332C10.3657 33.1206 14.7016 29 20 29H28C33.2914 29 37.6229 33.1097 37.9767 38.3113" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>我的</span>
      </button>
    </nav>
  </div>

  <!-- 消息操作弹出菜单 -->
  <div id="message-action-menu" class="popup-menu hidden">
    <button data-action="regenerate">
      <svg class="icon" viewBox="0 0 48 48" fill="none"><path d="M13 35H7V41" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M41 41H35V35" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M35 13H41V7" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M7 7H13V13" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M13 7.29395C7.57778 10.8714 4 17.0178 4 23.9999C4 25.0195 4.0763 26.0213 4.2235 26.9999" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M26.9999 43.7765C26.0213 43.9237 25.0195 44 23.9999 44C17.0178 44 10.8714 40.4222 7.29395 35" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M43.7765 21C43.9237 21.9786 44 22.9804 44 24C44 30.9821 40.4222 37.1285 35 40.706" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 4.2235C21.9786 4.0763 22.9804 4 24 4C30.9821 4 37.1285 7.57778 40.706 13" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      重新生成
    </button>
    <button data-action="copy">
      <svg class="icon" viewBox="0 0 48 48" fill="none"><path d="M13 12.4316V7.8125C13 6.2592 14.2592 5 15.8125 5H40.1875C41.7408 5 43 6.2592 43 7.8125V32.1875C43 33.7408 41.7408 35 40.1875 35H35.5163" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M32.1875 13H7.8125C6.2592 13 5 14.2592 5 15.8125V40.1875C5 41.7408 6.2592 43 7.8125 43H32.1875C33.7408 43 35 41.7408 35 40.1875V15.8125C35 14.2592 33.7408 13 32.1875 13Z" fill="none" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/></svg>
      复制
    </button>
    <button data-action="like">
      <svg class="icon" viewBox="0 0 48 48" fill="none"><path d="M27.6002 18.5998V11.3998C27.6002 8.41743 25.1826 5.99977 22.2002 5.99977L15.0002 22.1998V41.9998H35.9162C37.7113 42.0201 39.2471 40.7147 39.5162 38.9398L42.0002 22.7398C42.1587 21.6955 41.8506 20.6343 41.1576 19.8373C40.4645 19.0403 39.4564 18.5878 38.4002 18.5998H27.6002Z" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/><path d="M15 22.0001H10.194C8.08532 21.9628 6.2827 23.7095 6 25.7994V38.3994C6.2827 40.4894 8.08532 42.0367 10.194 41.9994H15V22.0001Z" fill="none" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/></svg>
      点赞
    </button>
    <button data-action="dislike">
      <svg class="icon" viewBox="0 0 48 48" fill="none"><path d="M20.3793 29.4002V36.6002C20.3793 39.5826 22.7969 42.0002 25.7793 42.0002L32.9793 25.8002V6.00023H12.0633C10.2682 5.97994 8.73244 7.2853 8.46327 9.06023L5.97927 25.2602C5.82077 26.3045 6.12885 27.3657 6.82192 28.1627C7.51499 28.9597 8.52311 29.4122 9.57927 29.4002H20.3793Z" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/><path d="M32.9795 6.00017H37.7855C39.8942 5.96288 41.6968 7.51019 41.9795 9.60017V22.2002C41.6968 24.2901 39.8942 26.0375 37.7855 26.0002H32.9795V6.00017Z" fill="none" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/></svg>
      踩
    </button>
  </div>

  <!-- 新建对话选择面板 -->
  <div id="new-chat-panel" class="overlay-panel hidden">
    <div class="panel-card">
      <h3>新建对话</h3>
      <p class="panel-subtitle">选择预设模板或自定义创建</p>
      <div class="panel-preset-grid" id="panel-preset-grid">
        <!-- 动态渲染 -->
      </div>
      <div class="panel-divider"><span>或</span></div>
      <button id="btn-custom-create" class="btn-primary panel-btn">
        自定义创建角色
      </button>
      <button id="btn-close-panel" class="btn-text panel-close">取消</button>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
