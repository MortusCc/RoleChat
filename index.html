<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RoleChat - AI 角色扮演</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 主容器 -->
  <div id="app">

    <!-- ========== 对话列表页 ========== -->
    <section id="page-chat-list" class="page">
      <header class="top-bar">
        <h1>对话</h1>
        <button id="btn-new-chat" class="icon-btn" title="新建对话">
          <svg class="icon" viewBox="0 0 48 48"><!-- 新建对话图标 --></svg>
        </button>
      </header>
      <div class="search-bar">
        <svg class="icon icon-search" viewBox="0 0 48 48"><!-- 搜索图标 --></svg>
        <input type="text" id="search-input" placeholder="搜索对话...">
      </div>
      <div id="chat-list-container" class="list-container">
        <!-- 动态渲染对话卡片 -->
        <div class="empty-state">
          <p>还没有对话，点击右上角开始吧</p>
        </div>
      </div>
    </section>

    <!-- ========== 对话界面 ========== -->
    <section id="page-chat-room" class="page hidden">
      <header class="top-bar">
        <button id="btn-back" class="icon-btn" title="返回">
          <svg class="icon" viewBox="0 0 48 48"><!-- 返回图标 --></svg>
        </button>
        <div class="top-bar-title" id="chat-title">世界观名称</div>
        <button id="btn-role-switch" class="icon-btn" title="切换角色">
          <svg class="icon" viewBox="0 0 48 48"><!-- 角色切换图标 --></svg>
        </button>
      </header>
      <div id="message-list" class="message-list">
        <!-- 动态渲染消息气泡 -->
      </div>
      <div class="input-area">
        <input type="text" id="message-input" placeholder="输入消息..." autocomplete="off">
        <button id="btn-send" class="icon-btn send-btn" title="发送">
          <svg class="icon" viewBox="0 0 48 48"><!-- 发送图标 --></svg>
        </button>
      </div>
    </section>

    <!-- ========== 角色管理页 ========== -->
    <section id="page-role-manage" class="page hidden">
      <header class="top-bar">
        <h1>角色</h1>
        <button id="btn-new-role" class="icon-btn" title="新建角色">
          <svg class="icon" viewBox="0 0 48 48"><!-- 新建图标 --></svg>
        </button>
      </header>
      <div id="role-list-container" class="list-container">
        <div class="empty-state">
          <p>还没有角色卡，点击右上角创建</p>
        </div>
      </div>
    </section>

    <!-- ========== 角色创建/编辑页 ========== -->
    <section id="page-role-create" class="page hidden">
      <header class="top-bar">
        <button id="btn-role-create-back" class="icon-btn" title="返回">
          <svg class="icon" viewBox="0 0 48 48"><!-- 返回图标 --></svg>
        </button>
        <h1 id="role-create-title">新建角色</h1>
      </header>
      <form id="role-form" class="form-container">
        <div class="form-group">
          <label>
            <svg class="icon icon-label" viewBox="0 0 48 48"><!-- 世界观图标 --></svg>
            世界观设定
          </label>
          <textarea id="role-worldview" rows="3" placeholder="描述世界观背景，例如：中世纪的魔法大陆..."></textarea>
        </div>
        <div class="form-group">
          <label>
            <svg class="icon icon-label" viewBox="0 0 48 48"><!-- 角色图标 --></svg>
            AI 角色设定
          </label>
          <input type="text" id="role-ai-name" placeholder="角色名称">
          <textarea id="role-ai-persona" rows="2" placeholder="性格、口癖、说话风格..."></textarea>
        </div>
        <div class="form-group">
          <label>
            <svg class="icon icon-label" viewBox="0 0 48 48"><!-- 面具图标 --></svg>
            你的扮演身份
          </label>
          <input type="text" id="role-user-identity" placeholder="你在世界观中的身份">
        </div>
        <button type="submit" id="btn-save-role" class="btn-primary">
          <svg class="icon" viewBox="0 0 48 48"><!-- 保存图标 --></svg>
          保存角色
        </button>
      </form>
    </section>

    <!-- ========== 发现页 ========== -->
    <section id="page-discover" class="page hidden">
      <header class="top-bar">
        <h1>发现</h1>
      </header>
      <div class="list-container">
        <div class="empty-state">
          <p>公共模板即将上线</p>
        </div>
      </div>
    </section>

    <!-- ========== 我的页 ========== -->
    <section id="page-profile" class="page hidden">
      <header class="top-bar">
        <h1>我的</h1>
      </header>
      <div class="list-container">
        <div class="profile-section">
          <div class="profile-item">
            <span>API 状态</span>
            <span id="api-status" class="status-badge">未检测</span>
          </div>
          <div class="profile-item">
            <span>对话数量</span>
            <span id="chat-count">0</span>
          </div>
          <div class="profile-item">
            <span>角色数量</span>
            <span id="role-count">0</span>
          </div>
          <div class="profile-item">
            <span>API Key 配置</span>
            <input type="password" id="api-key-input" placeholder="输入 API Key...">
          </div>
        </div>
      </div>
    </section>

    <!-- ========== 底部导航栏 ========== -->
    <nav id="bottom-nav">
      <button class="nav-item active" data-page="chat-list" title="对话">
        <svg class="icon nav-icon" viewBox="0 0 48 48"><!-- 对话图标 --></svg>
        <span>对话</span>
      </button>
      <button class="nav-item" data-page="role-manage" title="角色">
        <svg class="icon nav-icon" viewBox="0 0 48 48"><!-- 角色图标 --></svg>
        <span>角色</span>
      </button>
      <button class="nav-item" data-page="discover" title="发现">
        <svg class="icon nav-icon" viewBox="0 0 48 48"><!-- 发现图标 --></svg>
        <span>发现</span>
      </button>
      <button class="nav-item" data-page="profile" title="我的">
        <svg class="icon nav-icon" viewBox="0 0 48 48"><!-- 我的图标 --></svg>
        <span>我的</span>
      </button>
    </nav>
  </div>

  <!-- 消息操作弹出菜单 -->
  <div id="message-action-menu" class="popup-menu hidden">
    <button data-action="regenerate">
      <svg class="icon" viewBox="0 0 48 48"><!-- 重新生成图标 --></svg>
      重新生成
    </button>
    <button data-action="copy">
      <svg class="icon" viewBox="0 0 48 48"><!-- 复制图标 --></svg>
      复制
    </button>
    <button data-action="like">
      <svg class="icon" viewBox="0 0 48 48"><!-- 点赞图标 --></svg>
      点赞
    </button>
    <button data-action="dislike">
      <svg class="icon" viewBox="0 0 48 48"><!-- 踩图标 --></svg>
      踩
    </button>
  </div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
